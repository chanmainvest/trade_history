name: Release — docs + Docker

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write      # commit docs/index.html back to the tag
  packages: write      # push Docker image to GHCR

jobs:
  # ---------------------------------------------------------------------------
  # 1. Regenerate docs/index.html and commit it to the repository
  # ---------------------------------------------------------------------------
  build-docs:
    name: Build docs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Build docs/index.html
        run: uv run python scripts/build_docs.py

      - name: Commit regenerated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if there are changes
          git diff --cached --quiet || \
            git commit -m "docs: regenerate docs/index.html for ${{ steps.tag.outputs.tag }} [skip ci]"
          git push origin HEAD:main

  # ---------------------------------------------------------------------------
  # 2. Build and push the Docker image to GHCR
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull the commit that includes the regenerated docs
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trade_history
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.build-docs.outputs.tag }}
